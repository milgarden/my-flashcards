<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AWS SAA 音声単語帳</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f9; }
        #card { background: white; width: 80%; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        #word { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        #meaning { font-size: 1.2rem; color: #555; display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        #status { margin-top: 30px; color: #ff9900; font-weight: bold; }
    </style>
</head>
<body>

    <h1>神田ジジの単語帳だよ～～～777</h1>
    <div id="card">
        <div id="word">読み込み中...</div>
        <div id="meaning"></div>
    </div>
    <div id="status">音声認識 準備中...</div>

    <script src="./dict.js"></script>

    <script>
        let currentIndex = 0;
        let waitTimer = null;
        let isPaused = false;

        const wordElement = document.getElementById('word');
        const meaningElement = document.getElementById('meaning');
        const statusElement = document.getElementById('status');

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        function showAnswer() {
            if (waitTimer) clearTimeout(waitTimer);
            waitTimer = null;
            isPaused = false;
            meaningElement.style.display = 'block';
            statusElement.innerText = "「おぼえた」または「まだ」と言ってください";
            if (window.wordList) speak(window.wordList[currentIndex].meaning);
        }

        function nextWord() {
            if (!window.wordList || window.wordList.length === 0) {
                wordElement.innerText = "dict.jsが読み込めません";
                return;
            }
            if (currentIndex >= window.wordList.length) currentIndex = 0;
            
            const data = window.wordList[currentIndex];
            wordElement.innerText = data.word;
            meaningElement.innerText = data.meaning;
            meaningElement.style.display = 'none';
            statusElement.innerText = "5秒後に回答を表示します...";
            
            isPaused = false;
            if (waitTimer) clearTimeout(waitTimer);
            waitTimer = setTimeout(showAnswer, 5000);
        }

        // 音声認識の設定
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusElement.innerText = "音声認識非対応ブラウザです";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript;
                console.log("認識:", transcript);

                if (transcript.includes("タイム")) {
                    if (waitTimer) {
                        clearTimeout(waitTimer);
                        waitTimer = null;
                        isPaused = true;
                        statusElement.innerText = "一時停止中...（『回答』と言ってください）";
                        speak("ちょっと待って");
                    }
                } else if (transcript.includes("回答")) {
                    showAnswer();
                } else if (transcript.includes("おぼえた")) {
                    currentIndex++;
                    nextWord();
                } else if (transcript.includes("まだ")) {
                    nextWord();
                }
            };

            recognition.onend = () => recognition.start();
            
            window.onload = () => {
                nextWord();
                recognition.start();
            };
        }
    </script>
</body>
</html>
