<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS SAA 音声単語帳</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f9; }
        #card { background: white; width: 80%; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        h1 { color: #232f3e; }
        #word { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        #meaning { font-size: 1.2rem; color: #555; display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        #status { margin-top: 30px; color: #ff9900; font-weight: bold; min-height: 1.5rem; }
        .hint { color: #888; font-size: 0.8rem; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>神田ジィジの単語帳だよ～～～</h1>
    <h1>SAA Flashcards</h1>

    <div id="card">
        <div id="word">読み込み中...</div>
        <div id="meaning"></div>
    </div>

    <div id="status">音声認識 待機中...</div>

    <div class="hint">
        「タイム」：5秒タイマー停止<br>
        「回答」：答えを表示
    </div>

    <script src="dict.js"></script>

    <script>
        let currentIndex = 0;
        let waitTimer = null;
        let isPaused = false;

        const wordElement = document.getElementById('word');
        const meaningElement = document.getElementById('meaning');
        const statusElement = document.getElementById('status');

        // 音声合成（読み上げ）
        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        // 次の単語を表示
        function nextWord() {
            if (currentIndex >= wordList.length) currentIndex = 0;
            const currentData = wordList[currentIndex];
            
            wordElement.innerText = currentData.word;
            meaningElement.innerText = currentData.meaning;
            meaningElement.style.display = 'none';
            statusElement.innerText = "5秒後に回答を表示します...";
            
            isPaused = false;
            
            // 5秒タイマー開始
            if (waitTimer) clearTimeout(waitTimer);
            waitTimer = setTimeout(() => {
                showAnswer();
            }, 5000);
        }

        // 回答を表示
        function showAnswer() {
            if (waitTimer) clearTimeout(waitTimer);
            waitTimer = null;
            isPaused = false;
            meaningElement.style.display = 'block';
            statusElement.innerText = "「おぼえた」または「まだ」と言ってください";
            speak(wordList[currentIndex].meaning);
        }

        // 音声認識の設定
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript;
            console.log("認識:", transcript);

            // 「タイム」で一時停止
            if (transcript.includes("タイム")) {
                if (waitTimer) {
                    clearTimeout(waitTimer);
                    waitTimer = null;
                    isPaused = true;
                    statusElement.innerText = "一時停止中...（回答待ち）";
                    speak("ちょっと待って。準備ができたら回答と言ってください");
                }
            }

            // 「回答」で再開
            else if (transcript.includes("回答")) {
                if (isPaused || waitTimer) {
                    showAnswer();
                }
            }

            // 判定
            else if (transcript.includes("おぼえた")) {
                currentIndex++;
                nextWord();
            } 
            else if (transcript.includes("まだ")) {
                nextWord(); // 同じ単語をリトライ（または順序調整）
            }
        };

        recognition.onend = () => recognition.start(); // 常に起動

        // 起動
        window.onload = () => {
            if (typeof wordList !== 'undefined' && wordList.length > 0) {
                nextWord();
                recognition.start();
            } else {
                wordElement.innerText = "dict.jsが見つかりません";
            }
        };
    </script>
</body>
</html>
