<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA 攻略単語帳 Pro+ Voice</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
    background: #f0f2f5;
}
#card {
    background: white;
    width: 92%; max-width: 500px;
    min-height: 350px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    border-radius: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    text-align: center; padding: 30px;
    position: relative; cursor: pointer;
}
.label { color:#007aff; font-weight:600; margin-bottom:15px; }
.content { font-size:1.4rem; font-weight:bold; white-space:pre-wrap; }

#controls { margin-top:20px; text-align:center; }
button {
    padding:12px 20px; margin:5px;
    border:none; border-radius:10px;
    font-weight:bold; cursor:pointer;
}
.correct-btn { background:#34c759; color:white; }
.wrong-btn { background:#ff3b30; color:white; }
.prev-btn { background:#999; color:white; }

#voice-status { font-size:0.8rem; color:#007aff; }
</style>
</head>

<body>

<div id="card">
    <div id="label" class="label">READY</div>
    <div id="content" class="content">カテゴリを選択</div>
    <div id="voice-status"></div>
</div>

<div id="controls">
    <select id="category-select"></select>
    <button id="start-btn" style="display:none;">開始</button>

    <div id="answer-buttons" style="display:none;">
        <button class="wrong-btn" onclick="handleResult(false)">❌</button>
        <button class="correct-btn" onclick="handleResult(true)">⭕️</button>
        <button class="prev-btn" onclick="goPrev()">← 前</button>
    </div>

    <div id="stats"></div>
    <button onclick="resetCategory()">カテゴリリセット</button>
</div>

<script src="dict.js"></script>
<script src="config.js"></script>

<script>
const labelEl = document.getElementById('label');
const contentEl = document.getElementById('content');
const voiceStatusEl = document.getElementById('voice-status');
const categorySelect = document.getElementById('category-select');
const startBtn = document.getElementById('start-btn');
const answerButtons = document.getElementById('answer-buttons');

const synth = speechSynthesis;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;

if (recognition) {
    recognition.lang = 'ja-JP';
}

let dataRows = [];
let currentIndex = 0;
let currentCategory = "";

function getStorageKey() {
    return "learned_" + currentCategory;
}

// カテゴリ生成
categoryFiles.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.file;
    opt.textContent = c.name;
    categorySelect.appendChild(opt);
});

categorySelect.onchange = async () => {
    currentCategory = categorySelect.value;
    const res = await fetch(currentCategory);
    const text = await res.text();

    const rows = text.split("\n").slice(1).map(r=>r.split(","));
    const learned = JSON.parse(localStorage.getItem(getStorageKey())||"[]");

    dataRows = rows.filter(r => r[1] && !learned.includes(r[1].trim()));

    startBtn.style.display = dataRows.length ? "block":"none";
    contentEl.innerText = `問題数: ${dataRows.length}`;
};

startBtn.onclick = () => {
    startBtn.style.display="none";
    categorySelect.style.display="none";
    nextQuestion();
};

function speak(text, callback) {
    let t = text;
    for (const [k,v] of Object.entries(dict||{})) {
        t = t.replace(new RegExp(k,'g'), v);
    }
    const u = new SpeechSynthesisUtterance(t);
    u.lang="ja-JP";
    u.onend = callback;
    synth.speak(u);
}

function nextQuestion() {
    if (!dataRows.length) {
        contentEl.innerText = "COMPLETE！";
        return;
    }

    if (currentIndex >= dataRows.length) currentIndex = 0;

    const row = dataRows[currentIndex];

    labelEl.innerText="問題";
    contentEl.innerText=row[0];

    answerButtons.style.display="none";

    speak(row[0], startListening);
}

function showAnswer() {
    const row = dataRows[currentIndex];

    labelEl.innerText="回答";
    contentEl.innerText=row[1];

    answerButtons.style.display="block";

    speak(row[1], startListening);
}

// 音声認識
function startListening() {
    if (!recognition) return;

    voiceStatusEl.innerText="🎤 待機中...";
    try { recognition.start(); } catch(e){}
}

if (recognition) {
    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        voiceStatusEl.innerText = "認識: " + text;

        if (text.includes("答え")) {
            showAnswer();
        }
        else if (text.includes("まだ")) {
            handleResult(false);
        }
        else if (text.includes("おぼえた") || text.includes("覚えた")) {
            handleResult(true);
        }
        else if (text.includes("前")) {
            goPrev();
        }
        else {
            setTimeout(startListening, 1000);
        }
    };

    recognition.onend = () => {
        setTimeout(startListening, 500);
    };
}

// 前へ
function goPrev() {
    if (currentIndex > 0) currentIndex--;
    nextQuestion();
}

// 判定
function handleResult(correct) {
    const learned = JSON.parse(localStorage.getItem(getStorageKey())||"[]");

    if (correct) {
        learned.push(dataRows[currentIndex][1].trim());
        localStorage.setItem(getStorageKey(), JSON.stringify(learned));
        dataRows.splice(currentIndex,1);
    } else {
        currentIndex++;
    }

    nextQuestion();
}

// リセット（カテゴリ単位）
function resetCategory() {
    if (!currentCategory) return;
    if (confirm("このカテゴリをリセット？")) {
        localStorage.removeItem(getStorageKey());
        location.reload();
    }
}
</script>

</body>
</html>
