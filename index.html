<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA 改良版</title>
<style>
body { font-family: -apple-system, sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#f0f2f5; }
#card { background:white; width:92%; max-width:500px; min-height:320px; display:flex; flex-direction:column; justify-content:center; align-items:center; border-radius:20px; padding:20px; text-align:center; cursor:pointer; }
.label { color:#007aff; font-weight:bold; margin-bottom:10px; }
.content { font-size:1.3rem; font-weight:bold; }
#controls { margin-top:20px; display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; }
button { padding:12px 20px; border:none; border-radius:10px; font-size:1rem; cursor:pointer; }
.correct { background:#34c759; color:white; }
.wrong { background:#ff3b30; color:white; }
.prev { background:#ff9500; color:white; }
.show { background:#5856d6; color:white; }
</style>
</head>
<body>
<div id="card">
<div id="label" class="label">READY</div>
<div id="content" class="content">カテゴリを選択</div>
<div id="voice"></div>
</div>
<div id="controls">
<select id="category"></select>
<button id="start">開始</button>
<button id="show" class="show">答え</button>
<div id="actions">
<button class="wrong" onclick="answer(false)">まだ</button>
<button class="correct" onclick="answer(true)">覚えた</button>
<button class="prev" onclick="prev()">前</button>
</div>
<button onclick="resetCategory()">カテゴリリセット</button>
</div>
<script src="dict.js"></script>
<script src="config.js"></script>
<script>
const synth = speechSynthesis;
const rec = window.SpeechRecognition||window.webkitSpeechRecognition;
const recognition = rec? new rec():null;
if(recognition){ recognition.lang='ja-JP'; }

let data=[], index=0, currentCategory="";
const label=document.getElementById('label');
const content=document.getElementById('content');
const voice=document.getElementById('voice');
const select=document.getElementById('category');

categoryFiles.forEach(c=>{
 let o=document.createElement('option'); o.value=c.file; o.textContent=c.name; select.appendChild(o);
});

select.onchange=async()=>{
 currentCategory=select.value;
 const res=await fetch(currentCategory);
 const txt=await res.text();
 data=parseCSV(txt).slice(1);
 const saved=JSON.parse(localStorage.getItem(currentCategory)||"{}");
 index=saved.index||0;
 content.innerText="準備OK";
};

document.getElementById('start').onclick=()=>next();

document.getElementById('show').onclick=()=>showAnswer();

function speak(t){
 let u=new SpeechSynthesisUtterance(t);
 u.lang='ja-JP'; synth.speak(u);
}

function next(){
 if(index>=data.length) index=0;
 label.innerText="問題";
 content.innerText=data[index][0];
 speak(data[index][0]);
 startListen();
}

function showAnswer(){
 label.innerText="回答";
 content.innerText=data[index][1];
 speak(data[index][1]);
}

function answer(ok){
 let store=JSON.parse(localStorage.getItem(currentCategory)||"{}");
 if(ok){
   if(!store.learned) store.learned=[];
   store.learned.push(index);
 }
 index++;
 store.index=index;
 localStorage.setItem(currentCategory, JSON.stringify(store));
 next();
}

function prev(){
 if(index>0) index--;
 showAnswer();
}

function resetCategory(){
 localStorage.removeItem(currentCategory);
 alert("リセット完了");
}

if(recognition){
 recognition.onresult=(e)=>{
   let t=e.results[0][0].transcript;
   voice.innerText=t;
   if(t.includes("まだ")) answer(false);
   else if(t.includes("覚え")||t.includes("おぼえ")) answer(true);
   else if(t.includes("前")) prev();
   else if(t.includes("答え")||t.includes("こたえ")) showAnswer();
 };
}

function startListen(){
 if(recognition) try{recognition.start()}catch{}
}

function parseCSV(t){return t.split('\n').map(r=>r.split(','));}

card.onclick=()=>showAnswer();
</script>
</body>
</html>
