<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA 攻略単語帳 Pro+ Voice</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh; margin:0;
    background:#f0f2f5;
}

#card {
    background:white;
    width:92%; max-width:500px;
    min-height:350px;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    border-radius:30px;
    padding:30px;
    text-align:center;
    cursor:pointer;
}

.label { color:#007aff; font-weight:600; margin-bottom:10px; }
.content { font-size:1.4rem; font-weight:bold; white-space:pre-wrap; }

#controls { margin-top:20px; display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }

button {
    padding:12px 20px;
    border:none;
    border-radius:12px;
    font-size:1.1rem;
    cursor:pointer;
}

.answer-btn { background:#5856d6; color:white; }
.correct { background:#34c759; color:white; }
.wrong { background:#ff3b30; color:white; }
.prev { background:#ff9500; color:white; }

.btn-row { display:none; gap:10px; }

#voice-status { font-size:0.8rem; color:#007aff; }
</style>
</head>

<body>

<div id="card">
<div id="label" class="label">READY</div>
<div id="content" class="content">カテゴリを選択してください</div>
<div id="voice-status"></div>
</div>

<div id="controls">
<select id="category-select">
<option value="">-- カテゴリを選択 --</option>
</select>

<button id="start-btn">学習開始</button>

<button id="answer-btn" class="answer-btn" style="display:none;">こたえ</button>

<div id="answer-buttons" class="btn-row">
<button class="wrong">まだ</button>
<button class="correct">覚えた</button>
<button class="prev">前</button>
</div>

<button id="reset-btn">カテゴリリセット</button>
</div>

<script src="dict.js"></script>
<script src="config.js"></script>

<script>
const labelEl = document.getElementById('label');
const contentEl = document.getElementById('content');
const voiceStatusEl = document.getElementById('voice-status');
const categorySelect = document.getElementById('category-select');

const startBtn = document.getElementById('start-btn');
const answerBtn = document.getElementById('answer-btn');
const answerButtons = document.getElementById('answer-buttons');
const resetBtn = document.getElementById('reset-btn');

const synth = speechSynthesis;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;

if (recognition) {
    recognition.lang = 'ja-JP';
}

let dataRows = [];
let currentIndex = 0;
let currentCategory = "";
let isAnswering = false;

/* カテゴリ生成 */
categoryFiles.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.file;
    opt.textContent = item.name;
    categorySelect.appendChild(opt);
});

/* CSV */
function parseCSV(text) {
    return text.split('\n').map(r => r.split(','));
}

/* カテゴリ選択 */
categorySelect.addEventListener('change', async (e) => {
    currentCategory = e.target.value;
    if (!currentCategory) return;

    const res = await fetch(currentCategory);
    const text = await res.text();

    const rows = parseCSV(text).slice(1);

    const saved = JSON.parse(localStorage.getItem(currentCategory) || "{}");

    currentIndex = saved.index || 0;
    const learned = saved.learned || [];

    dataRows = rows.filter((r, i) => !learned.includes(i));

    contentEl.innerText = `全 ${dataRows.length} 問`;
});

/* 開始 */
startBtn.onclick = () => {
    nextQuestion();
};

/* 問題表示 */
function nextQuestion() {
    if (currentIndex >= dataRows.length) currentIndex = 0;

    const row = dataRows[currentIndex];

    isAnswering = false;

    labelEl.innerText = "問題";
    contentEl.innerText = row[0];

    answerBtn.style.display = "block";
    answerButtons.style.display = "none";

    speak(row[0]);
}

/* 回答表示 */
function showAnswer() {
    const row = dataRows[currentIndex];

    isAnswering = true;

    labelEl.innerText = "回答";
    contentEl.innerText = row[1];

    answerBtn.style.display = "none";
    answerButtons.style.display = "flex";

    speak(row[1]);

    startListening();
}

/* 音声 */
function speak(text) {
    let t = text;
    if (typeof dict !== 'undefined') {
        for (const [k,v] of Object.entries(dict)) {
            t = t.replace(new RegExp(k,'gi'),v);
        }
    }
    const u = new SpeechSynthesisUtterance(t);
    u.lang = "ja-JP";
    synth.speak(u);
}

/* 判定 */
function handleResult(correct) {
    const store = JSON.parse(localStorage.getItem(currentCategory) || "{}");

    if (correct) {
        if (!store.learned) store.learned = [];
        store.learned.push(currentIndex);
    } else {
        currentIndex++;
    }

    store.index = currentIndex;

    localStorage.setItem(currentCategory, JSON.stringify(store));

    nextQuestion();
}

/* 前 */
function prevQuestion() {
    if (currentIndex > 0) currentIndex--;
    showAnswer();
}

/* ボタン */
document.querySelector('.wrong').onclick = () => handleResult(false);
document.querySelector('.correct').onclick = () => handleResult(true);
document.querySelector('.prev').onclick = prevQuestion;
answerBtn.onclick = showAnswer;

/* 音声認識 */
function startListening() {
    if (!recognition) return;
    try { recognition.start(); } catch {}
}

if (recognition) {
    recognition.onresult = (e) => {
        const t = e.results[0][0].transcript;
        voiceStatusEl.innerText = t;

        if (t.includes("まだ")) handleResult(false);
        else if (t.includes("覚え") || t.includes("おぼえ")) handleResult(true);
        else if (t.includes("前")) prevQuestion();
        else if (t.includes("答え") || t.includes("こたえ")) showAnswer();
    };
}

/* カードタップ → 回答 */
document.getElementById('card').onclick = () => {
    if (!isAnswering) showAnswer();
};

/* リセット（カテゴリ単位） */
resetBtn.onclick = () => {
    if (!currentCategory) return;
    if (confirm("このカテゴリをリセットしますか？")) {
        localStorage.removeItem(currentCategory);
        location.reload();
    }
};
</script>

</body>
</html>
