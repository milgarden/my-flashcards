<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA 改良版　20260506</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
    background:#f0f2f5;
}

#card {
    background:white;
    width:92%;
    max-width:500px;
    min-height:350px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-radius:30px;
    padding:30px;
    text-align:center;
    cursor:pointer;
}

.label { color:#007aff; font-weight:bold; }
.content { font-size:1.3rem; font-weight:bold; }

#controls {
    margin-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    width:100%;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:1rem;
    cursor:pointer;
}

.correct { background:#34c759; color:white; }
.wrong { background:#ff3b30; color:white; }
.prev { background:#ff9500; color:white; }
.answer { background:#5856d6; color:white; }

</style>
</head>

<body>

<div id="card">
    <div id="label" class="label">READY</div>
    <div id="content" class="content">カテゴリを選択してください</div>
    <div id="voice-status"></div>
</div>

<div id="controls">
    <select id="category-select"></select>
    <button id="start-btn">開始</button>

    <!-- 質問用 -->
    <button id="answer-btn" class="answer" style="display:none;">こたえ</button>

    <!-- 回答用 -->
    <div id="answer-group" style="display:none;">
        <button class="wrong" onclick="handleResult(false)">まだ</button>
        <button class="correct" onclick="handleResult(true)">覚えた</button>
        <button class="prev" onclick="goPrev()">前</button>
    </div>

    <button onclick="resetCategory()">カテゴリリセット</button>
</div>

<script src="dict.js"></script>
<script src="config.js"></script>

<script>
const synth = speechSynthesis;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;

if(recognition){
    recognition.lang = 'ja-JP';
}

let dataRows = [];
let currentIndex = 0;
let currentCategory = "";
let isAnswering = false;

const labelEl = document.getElementById('label');
const contentEl = document.getElementById('content');
const voiceEl = document.getElementById('voice-status');

const categorySelect = document.getElementById('category-select');
const answerBtn = document.getElementById('answer-btn');
const answerGroup = document.getElementById('answer-group');


// カテゴリ生成
categoryFiles.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.file;
    opt.textContent = c.name;
    categorySelect.appendChild(opt);
});


// CSV
function parseCSV(text){
    return text.split("\n").map(r=>r.split(","));
}


// カテゴリ選択
categorySelect.onchange = async ()=>{
    currentCategory = categorySelect.value;

    const res = await fetch(currentCategory);
    const text = await res.text();
    dataRows = parseCSV(text).slice(1);

    const saved = JSON.parse(localStorage.getItem(currentCategory) || "{}");
    currentIndex = saved.index || 0;

    contentEl.innerText = "準備OK";
};


// 開始
document.getElementById('start-btn').onclick = ()=>{
    nextQuestion();
};


// 問題表示
function nextQuestion(){
    if(currentIndex >= dataRows.length) currentIndex = 0;

    labelEl.innerText = "問題";
    contentEl.innerText = dataRows[currentIndex][0];

    speak(dataRows[currentIndex][0]);

    isAnswering = false;

    answerBtn.style.display = "block";
    answerGroup.style.display = "none";

    startListening();
}


// 回答表示
function showAnswer(){
    labelEl.innerText = "回答";
    contentEl.innerText = dataRows[currentIndex][1];

    speak(dataRows[currentIndex][1]);

    isAnswering = true;

    answerBtn.style.display = "none";
    answerGroup.style.display = "block";

    startListening();
}


// 音声
function speak(text){
    let t = text;

    if(typeof dict !== 'undefined'){
        for(const [k,v] of Object.entries(dict)){
            t = t.replace(new RegExp(k,'gi'), v);
        }
    }

    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'ja-JP';
    synth.speak(u);
}


// 判定
function handleResult(ok){
    if(!isAnswering) return;

    let store = JSON.parse(localStorage.getItem(currentCategory)||"{}");

    if(ok){
        if(!store.learned) store.learned = [];
        store.learned.push(currentIndex);
    }

    currentIndex++;
    store.index = currentIndex;

    localStorage.setItem(currentCategory, JSON.stringify(store));

    nextQuestion();
}


// 前へ
function goPrev(){
    if(currentIndex > 0) currentIndex--;
    showAnswer();
}


// カテゴリリセット
function resetCategory(){
    localStorage.removeItem(currentCategory);
    alert("カテゴリリセット完了");
}


// 音声認識
function startListening(){
    if(!recognition) return;

    try{ recognition.start(); }catch{}
}

if(recognition){
    recognition.onresult = (e)=>{
        const t = e.results[0][0].transcript;
        voiceEl.innerText = t;

        if(t.includes("まだ")) handleResult(false);
        else if(t.includes("覚え") || t.includes("おぼえ")) handleResult(true);
        else if(t.includes("前")) goPrev();
        else if(t.includes("答え") || t.includes("こたえ")) showAnswer();
    };
}


// タップで回答
document.getElementById('card').onclick = ()=>{
    if(!isAnswering) showAnswer();
};

</script>
</body>
</html>
